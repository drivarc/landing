        @font-face {

            font-display: swap;
            src: url('/fonts/Inter-700.woff2') format('woff2');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111318;
            color: #e2e2e9;
            min-height: 100vh;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 24px;
        }
        .error-container {
            text-align: center;
            max-width: 480px;
        }
        .error-code {
            font-size: clamp(80px, 15vw, 120px);
            font-weight: 700;
            color: #a9c7ff;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .error-description {
            font-size: 16px;
            color: #c4c6cf;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #405f90, #264777);
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(64, 95, 144, 0.4);
        }
        .btn-home svg {
            width: 20px;
            height: 20px;
        }
        [dir="rtl"] .btn-home svg {
            transform: scaleX(-1);
        }
        @media (prefers-color-scheme: light) {
            body { background: #f9f9ff; color: #191c20; }
            .error-description { color: #44474e; }
        }
