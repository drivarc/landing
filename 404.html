      gtag('config', 'G-28CR3Y25R3', {

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111318;
            color: #e2e2e9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .error-container {
            text-align: center;
            max-width: 480px;
        }
        .error-code {
            font-size: clamp(80px, 15vw, 120px);
            font-weight: 700;
            color: #a9c7ff;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .error-description {
            font-size: 16px;
            color: #c4c6cf;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #405f90, #264777);
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(64, 95, 144, 0.4);
        }
        .btn-home svg {
            width: 20px;
            height: 20px;
        }
        @media (prefers-color-scheme: light) {
            body { background: #f9f9ff; color: #191c20; }
            .error-description { color: #44474e; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Sayfa Bulunamadı</h1>
        <p class="error-description">Aradığınız sayfa mevcut değil veya taşınmış olabilir. Ana sayfaya dönerek devam edebilirsiniz.</p>
        <a href="index.html" class="btn-home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Ana Sayfaya Dön
        </a>
    </div>
</body>
