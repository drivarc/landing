name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Check static files exist
        run: |
          test -f index.html || exit 1
          test -f css/critical.css || exit 1
          test -f js/app-core.js || exit 1
          test -f manifest.json || exit 1
          test -f sitemap.xml || exit 1
          test -f robots.txt || exit 1

      - name: Check language folders
        run: |
          test -d en || exit 1
          test -d de || exit 1
          test -d ru || exit 1
          test -d ar || exit 1
          test -d zh || exit 1

      - name: Validate HTML basic structure
        run: |
          for f in *.html en/*.html de/*.html ru/*.html ar/*.html zh/*.html; do
            [ -f "$f" ] || continue
            grep -q "<!DOCTYPE html>" "$f" || { echo "Missing DOCTYPE in $f"; exit 1; }
            grep -q "<html" "$f" || { echo "Missing <html> in $f"; exit 1; }
          done

      - name: Validate JSON files
        run: |
          python3 -c "import json; json.load(open('manifest.json'))" || exit 1

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            /index.html
            /en/index.html
            /de/index.html
            /ru/index.html
            /ar/index.html
            /zh/index.html
          configPath: ./lighthouserc.json
          uploadArtifacts: true

      - name: Validate hreflang
        run: |
          for f in index.html en/index.html de/index.html ru/index.html ar/index.html zh/index.html; do
            [ -f "$f" ] || continue
            grep -q 'hreflang="tr"' "$f" || { echo "Missing tr hreflang in $f"; exit 1; }
            grep -q 'hreflang="en"' "$f" || { echo "Missing en hreflang in $f"; exit 1; }
            grep -q 'hreflang="de"' "$f" || { echo "Missing de hreflang in $f"; exit 1; }
            grep -q 'hreflang="ru"' "$f" || { echo "Missing ru hreflang in $f"; exit 1; }
            grep -q 'hreflang="ar"' "$f" || { echo "Missing ar hreflang in $f"; exit 1; }
            grep -q 'hreflang="zh"' "$f" || { echo "Missing zh hreflang in $f"; exit 1; }
            grep -q 'hreflang="x-default"' "$f" || { echo "Missing x-default hreflang in $f"; exit 1; }
          done
          echo "hreflang validation passed"

      - name: Check sitemap coverage
        run: |
          for lang in tr en de ru ar zh; do
            grep -q "hreflang=\"$lang\"" sitemap.xml || { echo "Missing $lang in sitemap"; exit 1; }
          done
          echo "sitemap coverage check passed"

      - name: Check translation sync status
        run: |
          echo "# Translation Status" > translation-status.md
          echo "Last updated: $(date)" >> translation-status.md
          for lang in en de ru ar zh; do
            count=$(grep -c 'translate=' "$lang/index.html" 2>/dev/null || echo 0)
            echo "- $lang: ~$count translated strings" >> translation-status.md
          done
          cat translation-status.md
