<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#111318"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#a9c7ff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#a9c7ff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#a9c7ff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#a9c7ff" stroke-width="1"/>
  </g>
  <!-- Logo D -->
  <g filter="url(#glow)">
    <text x="600" y="380" font-family="Arial Black, sans-serif" font-size="280" font-weight="900" fill="#a9c7ff" text-anchor="middle">D</text>
  </g>
  <!-- Title -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#e2e2e9" text-anchor="middle">Drivarc</text>
  <!-- Subtitle -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#c4c6cf" text-anchor="middle">Dijital Araç Yönetimi</text>
</svg>
